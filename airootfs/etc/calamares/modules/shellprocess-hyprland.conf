#
# Configuration for JaKooLit Hyprland Dotfiles installation
# This runs from the LIVE system to install dotfiles to target
---
# Run in live system context (NOT chroot) to access git and internet
dontChroot: true
# Higher timeout for git clone and dotfiles setup
timeout: 600

script:
    - command: "chmod +x /etc/calamares/scripts/install-jakoolit-dots && /etc/calamares/scripts/install-jakoolit-dots @@ROOT@@ ${USER}"
      timeout: 600
